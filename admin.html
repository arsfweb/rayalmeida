<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin | Ray Almeida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .confirmed { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- LOGIN -->
    <div id="login-box" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="glass p-10 rounded-3xl w-full max-w-md text-center">
            <h1 class="text-2xl font-bold mb-8 tracking-widest text-roseGold uppercase">Acesso Restrito</h1>
            <input type="password" id="pass" placeholder="Senha do Administrador" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-6 outline-none focus:border-roseGold transition">
            <button onclick="login()" class="w-full bg-roseGold text-slate-900 font-bold py-4 rounded-xl hover:brightness-110 transition">Entrar no Sistema</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-admin" class="hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-bold text-white">Olá, Ray Almeida</h1>
                <p class="text-slate-400">Gestão de agendamentos e performance.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="exportData()" class="bg-slate-800 px-6 py-3 rounded-xl border border-slate-700 hover:bg-slate-700 transition">
                    <i class="fas fa-file-export mr-2"></i> Exportar
                </button>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-6 py-3 rounded-xl hover:bg-red-500 hover:text-white transition">Sair</button>
            </div>
        </header>

        <!-- STATS -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass p-8 rounded-3xl">
                <p class="text-slate-400 text-xs uppercase tracking-widest mb-2">Total de Solicitações</p>
                <h2 id="stat-total" class="text-4xl font-bold">0</h2>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-slate-400 text-xs uppercase tracking-widest mb-2">Novos Hoje</p>
                <h2 id="stat-today" class="text-4xl font-bold text-roseGold">0</h2>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-slate-400 text-xs uppercase tracking-widest mb-2">Status Pendente</p>
                <h2 id="stat-pending" class="text-4xl font-bold text-amber-500">0</h2>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-slate-400 text-xs uppercase tracking-widest mb-2">Finalizados</p>
                <h2 id="stat-done" class="text-4xl font-bold text-emerald-500">0</h2>
            </div>
        </div>

        <!-- TABLE -->
        <div class="glass rounded-3xl overflow-hidden">
            <div class="p-6 border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
                <h3 class="text-xl font-bold">Próximos Horários</h3>
                <input type="text" id="search" onkeyup="renderTable()" placeholder="Buscar cliente..." class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg outline-none w-full md:w-64">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
                        <tr>
                            <th class="p-6">Cliente</th>
                            <th class="p-6">Serviço</th>
                            <th class="p-6">Data / Hora</th>
                            <th class="p-6">WhatsApp</th>
                            <th class="p-6">Status</th>
                            <th class="p-6 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table" class="divide-y divide-white/5">
                        <!-- Rendered by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('pass').value === 'ray2025') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-admin').classList.remove('hidden');
                renderTable();
            } else {
                alert('Acesso negado.');
            }
        }

        function renderTable() {
            const bookings = JSON.parse(localStorage.getItem('ray_bookings')) || [];
            const search = document.getElementById('search').value.toLowerCase();
            const table = document.getElementById('admin-table');
            
            // Stats
            document.getElementById('stat-total').innerText = bookings.length;
            document.getElementById('stat-pending').innerText = bookings.filter(b => b.status === 'Pendente').length;
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('stat-today').innerText = bookings.filter(b => b.date === today).length;

            table.innerHTML = '';
            
            bookings.filter(b => b.name.toLowerCase().includes(search)).reverse().forEach(b => {
                table.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="p-6 font-bold text-white">${b.name}</td>
                        <td class="p-6 text-sm text-slate-400">${b.service}</td>
                        <td class="p-6 text-sm">${b.date} às ${b.time}</td>
                        <td class="p-6 text-sm">
                            <a href="https://wa.me/55${b.whatsapp.replace(/\D/g,'')}" target="_blank" class="text-emerald-400 flex items-center gap-2">
                                <i class="fab fa-whatsapp"></i> ${b.whatsapp}
                            </a>
                        </td>
                        <td class="p-6">
                            <span class="status-badge ${b.status === 'Pendente' ? 'pending' : 'confirmed'} cursor-pointer" onclick="toggleStatus(${b.id})">
                                ${b.status}
                            </span>
                        </td>
                        <td class="p-6 text-center">
                            <button onclick="deleteBooking(${b.id})" class="text-red-400 hover:text-red-200 transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleStatus(id) {
            let bookings = JSON.parse(localStorage.getItem('ray_bookings'));
            bookings = bookings.map(b => b.id === id ? {...b, status: b.status === 'Pendente' ? 'Confirmado' : 'Pendente'} : b);
            localStorage.setItem('ray_bookings', JSON.stringify(bookings));
            renderTable();
        }

        function deleteBooking(id) {
            if(confirm('Excluir agendamento permanentemente?')) {
                let bookings = JSON.parse(localStorage.getItem('ray_bookings'));
                bookings = bookings.filter(b => b.id !== id);
                localStorage.setItem('ray_bookings', JSON.stringify(bookings));
                renderTable();
            }
        }

        function exportData() {
            const data = localStorage.getItem('ray_bookings');
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_agendamentos_ray.json';
            a.click();
        }
    </script>
</body>
</html>
